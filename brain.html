<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Monitor</title>
<style>
  :root {
    --bg:     #080c10;
    --bg2:    #0d1117;
    --bg3:    #161b22;
    --border: #21262d;
    --text:   #c9d1d9;
    --text2:  #8b949e;
    --text3:  #484f58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    height: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    background: rgba(8,12,16,.95);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .status-ring {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background .4s, box-shadow .4s;
  }
  .status-ring.connected {
    background: #2ea043;
    box-shadow: 0 0 0 3px rgba(46,160,67,.22);
    animation: pulse 2.6s ease-in-out infinite;
  }
  .status-ring.error { background: #da3633; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(46,160,67,.22); }
    50%      { box-shadow: 0 0 0 6px rgba(46,160,67,.06); }
  }
  header h1 {
    font-size: 11px; font-weight: 600;
    color: var(--text2);
    letter-spacing: .08em; text-transform: uppercase;
  }
  .hbadge {
    font-size: 11px; color: var(--text3);
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 1px 9px;
    font-variant-numeric: tabular-nums;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* 管理按钮 */
  .admin-btn {
    font-size: 10px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    border-radius: 4px; padding: 2px 9px; cursor: pointer;
    border: 1px solid; background: none;
    transition: opacity .15s;
  }
  .admin-btn:hover { opacity: .75; }
  .admin-btn:active { opacity: .5; }
  .admin-btn.restart  { color: #56d364; border-color: #238636; }
  .admin-btn.stop     { color: #f85149; border-color: #da3633; }
  .admin-btn.clr-mem  { color: #e3b341; border-color: #9e6a03; }
  .admin-btn.clr-file { color: #8b949e; border-color: #30363d; }

  /* 确认弹层 */
  .confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .confirm-overlay.show { display: flex; }
  .confirm-box {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; padding: 20px 24px; min-width: 260px;
  }
  .confirm-box p { font-size: 13px; color: var(--text); margin-bottom: 16px; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-actions button {
    font-size: 11px; font-weight: 600; border-radius: 4px;
    padding: 4px 14px; cursor: pointer; border: 1px solid;
  }
  .confirm-ok   { background: #21262d; color: #f85149; border-color: #da3633; }
  .confirm-ok:hover { background: #da3633; color: #fff; }
  .confirm-cancel { background: none; color: var(--text2); border-color: var(--border); }
  .confirm-cancel:hover { background: var(--bg3); }

  /* ── 3-col grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    height: calc(100vh - 40px);
    overflow: hidden;
  }
  .col {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden; min-width: 0;
  }
  .col:last-child { border-right: none; }

  .col-header {
    flex-shrink: 0;
    padding: 6px 14px;
    font-size: 10px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex; align-items: center; gap: 6px;
  }

  .col-body {
    flex: 1; overflow-y: scroll;
    scrollbar-width: none; -ms-overflow-style: none;
    padding: 10px 14px 16px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .col-body::-webkit-scrollbar { display: none; }

  /* ── 记忆列 ── */
  .mem-card {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn .16s ease;
  }
  .mem-card:last-child { border-bottom: none; }

  .mem-type {
    font-size: 9px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 1px;
  }
  /* type colors */
  .mt-new_entity     { color: #79c0ff; }
  .mt-new_object     { color: #79c0ff; }
  .mt-new_fact       { color: #56d364; }
  .mt-new_conclusion { color: #8b6fc5; }
  .mt-new_task       { color: #e3b341; }
  .mt-task_progress  { color: #e3b341; }
  .mt-task_complete  { color: #56d364; }
  .mt-opinion_expressed    { color: #ffa657; }
  .mt-impressive_statement { color: #f85149; }

  .mem-content { font-size: 11px; color: var(--text); line-height: 1.45; word-break: break-word; }
  .mem-time    { font-size: 9px; color: var(--text3); margin-top: 1px; font-variant-numeric: tabular-nums; }

  /* ── 注入/识别 列（dashboard 同款扁平风格） ── */

  /* 分隔线 */
  .b-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 8px 0 4px;
    color: var(--text3);
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  }
  .b-divider::before, .b-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* 小节标签 */
  .b-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase;
    color: var(--text3);
    margin: 5px 0 2px;
  }

  /* 注入方向 — 绿色，同 ev-response */
  .b-direction {
    font-size: 11px; color: #4ac157;
    line-height: 1.55; padding: 0;
  }
  .b-direction::before { content: '→ '; opacity: .5; }

  /* 匹配记忆 */
  .b-mem-row { padding: 2px 0; border-bottom: 1px solid var(--border); }
  .b-mem-row:last-child { border-bottom: none; }
  .b-mem-type {
    font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 1px;
  }
  .b-mem-content { font-size: 11px; color: var(--text2); line-height: 1.4; word-break: break-word; }
  .b-mem-detail  { font-size: 10px; color: var(--text3); line-height: 1.4; margin-top: 1px; word-break: break-word; }

  /* 对话记录 */
  .b-conv-row { font-size: 10px; line-height: 1.5; padding: 1px 0; word-break: break-word; }
  .b-conv-user   { color: #79c0ff; }
  .b-conv-jarvis { color: #ffa657; }

  /* 工具列表 — 黄色等宽，同 ev-tool_call */
  .b-tools {
    font-size: 11px; color: #c09030;
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    padding: 1px 0; line-height: 1.5;
  }

  /* 上一步工具结果 — 黄色等宽 */
  .b-toolresult {
    font-size: 10px; color: #a07828;
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    white-space: pre-wrap; word-break: break-all;
    padding: 1px 0; line-height: 1.45;
  }

  /* 系统提示词 — 可折叠，蓝色等宽 */
  details.b-prompt { width: 100%; margin: 3px 0; }
  details.b-prompt summary {
    font-size: 10px; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase;
    color: var(--text3); cursor: pointer;
    list-style: none; display: flex; align-items: center; gap: 5px;
    padding: 2px 0; user-select: none;
  }
  details.b-prompt summary::before { content: '▶'; font-size: 8px; transition: transform .15s; }
  details[open].b-prompt summary::before { transform: rotate(90deg); }
  details.b-prompt summary::-webkit-details-marker { display: none; }
  .b-prompt-text {
    font-size: 10px; font-family: 'SF Mono','Fira Code','Consolas', monospace;
    color: #79c0ff;
    white-space: pre-wrap; word-break: break-word;
    line-height: 1.55; margin-top: 3px;
    max-height: 380px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  /* 识别器写入 — 橙色 */
  .b-rec {
    font-size: 11px; color: #ffa657; padding: 0; line-height: 1.55;
  }
  .b-rec::before { content: '+ '; opacity: .5; }
  .b-none { font-size: 10px; color: var(--text3); font-style: italic; }

  /* 念头 — 蓝紫色，细体 */
  .b-thought {
    font-size: 11px; color: #8b6fc5; padding: 1px 0; line-height: 1.55;
    font-style: italic;
  }
  .b-thought-concept { font-weight: 700; font-style: normal; margin-right: 4px; }

  /* 行为约束 — 红色醒目 */
  .b-constraint {
    font-size: 11px; color: #f85149; padding: 0; line-height: 1.55;
  }
  .b-constraint::before { content: '⚑ '; opacity: .7; }

  /* ── 思考列（与 dashboard 完全一致） ── */

  /* think 文字 */
  .think-row {
    background: none; border: none; border-radius: 0;
    padding: 2px 0; margin: 1px 0;
    font-size: 11px; color: #8b6fc5;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    overflow-wrap: anywhere;
    animation: slideIn .16s ease;
  }
  .think-cursor::after {
    content: '▋'; animation: blink .9s step-end infinite;
    opacity: .7; font-size: 11px; vertical-align: middle;
  }

  /* 分隔线（新轮次） */
  .t-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 8px 0 4px;
    color: var(--text3);
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  }
  .t-divider::before, .t-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* 工具调用 */
  .t-tool {
    background: none; border: none;
    padding: 1px 0; margin: 1px 0;
    animation: slideIn .16s ease;
  }
  .t-tool-name {
    font-weight: 700;
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    font-size: 12px; color: #c09030;
  }
  .t-tool-args {
    margin-top: 2px; font-size: 11px;
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    color: #a07828; white-space: pre-wrap; word-break: break-all;
    overflow: hidden;
  }
  .t-tool-result {
    margin-top: 2px; font-size: 11px;
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    color: #a07828; white-space: normal; word-break: break-all; overflow: hidden;
  }

  /* 记忆写入 */
  .t-memories {
    background: #091510; border: 1px solid #162a1c;
    border-left: 3px solid #238636;
    border-radius: 7px; padding: 8px 12px;
    margin: 2px 0; animation: slideIn .16s ease;
  }
  .t-memories-tag {
    font-size: 10px; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase;
    background: #162a1c; color: #56d364;
    border-radius: 3px; padding: 1px 6px;
    display: inline-block; margin-bottom: 4px;
  }
  .t-mem-item {
    font-size: 12px; color: #56d364; padding: 1px 0;
  }
  .t-mem-item::before { content: '↳ '; opacity: .5; }

  /* 消息发送卡 */
  .t-message {
    background: #130e08; border: 1px solid #271c0a;
    border-left: 3px solid #f0883e;
    border-radius: 7px; padding: 8px 12px;
    margin: 2px 0; animation: slideIn .16s ease;
  }
  .t-message-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .t-message-tag {
    font-size: 10px; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase;
    background: #271c0a; color: #ffa657;
    border-radius: 3px; padding: 1px 6px;
  }
  .t-message-time { font-size: 10px; color: var(--text3); font-variant-numeric: tabular-nums; }
  .t-message-body { font-size: 13px; color: #e8924a; white-space: pre-wrap; word-break: break-word; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes blink { 0%,100%{opacity:.6} 50%{opacity:0} }

  .col-empty {
    color: var(--text3); font-size: 11px;
    text-align: center; padding: 40px 20px;
  }
</style>
</head>
<body>

<header>
  <div class="status-ring" id="status-dot"></div>
  <h1>Brain Monitor</h1>
  <div class="header-right">
    <span class="hbadge" id="quota-badge">配额 —</span>
    <span class="hbadge" id="mem-badge">记忆 —</span>
    <button class="admin-btn clr-file" onclick="adminAction('reset-files','清除 sandbox 文件？（readme.txt 和 world.txt 保留）')">清除文件</button>
    <button class="admin-btn clr-mem"  onclick="adminAction('reset-memories','清除所有记忆和对话记录？此操作不可恢复。')">清除记忆</button>
    <button class="admin-btn restart" id="btn-restart" onclick="handleRestartOrStart()">重启</button>
    <button class="admin-btn stop"    id="btn-stop"    onclick="adminAction('stop','暂停 Jarvis 意识循环？HTTP 服务保持运行。')">停止</button>
  </div>
</header>

<!-- 确认弹层 -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="confirm-ok" id="confirm-ok-btn">确认</button>
    </div>
  </div>
</div>

<div class="grid">

  <!-- COL 1: 思考流 -->
  <div class="col">
    <div class="col-header">思考流</div>
    <div class="col-body" id="think-col">
      <div class="col-empty">等待思考…</div>
    </div>
  </div>

  <!-- COL 2: 注入器 / 识别器 / 系统提示词 -->
  <div class="col">
    <div class="col-header">注入器 · 系统提示词 · 识别器</div>
    <div class="col-body" id="brain-col">
      <div class="col-empty">等待第一轮…</div>
    </div>
  </div>

  <!-- COL 3: 记忆 -->
  <div class="col">
    <div class="col-header">
      记忆
      <span id="mem-count" style="margin-left:auto;color:#56d364"></span>
    </div>
    <div class="col-body" id="mem-col">
      <div class="col-empty">加载中…</div>
    </div>
  </div>

</div>

<script>
  const dot        = document.getElementById('status-dot')
  const memCol     = document.getElementById('mem-col')
  const brainCol   = document.getElementById('brain-col')
  const thinkCol   = document.getElementById('think-col')
  const memBadge   = document.getElementById('mem-badge')
  const memCount   = document.getElementById('mem-count')
  const quotaBadge = document.getElementById('quota-badge')

  let brainEmpty = true
  let thinkEmpty = true

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function scrollBot(col) {
    col.scrollTo({ top: col.scrollHeight, behavior: 'smooth' })
  }

  // ── 记忆列 ──
  let knownMemIds = new Set()

  function renderMemories(rows) {
    if (!rows.length) {
      memCol.innerHTML = '<div class="col-empty">暂无记忆</div>'
      memCount.textContent = ''
      return
    }
    memCol.innerHTML = ''
    rows.forEach(m => {
      const card = document.createElement('div')
      card.className = 'mem-card'

      const isNew = !knownMemIds.has(m.id)
      knownMemIds.add(m.id)

      const headerEl = document.createElement('div')
      headerEl.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:1px'

      const typeEl = document.createElement('div')
      typeEl.className = `mem-type mt-${m.event_type || ''}`
      typeEl.style.flex = '1'
      typeEl.textContent = (m.event_type || '').replace(/_/g, ' ')

      headerEl.appendChild(typeEl)

      // 约束记忆显示删除按钮
      if (m.event_type === 'behavioral_constraint') {
        const delBtn = document.createElement('button')
        delBtn.textContent = '×'
        delBtn.style.cssText = 'background:none;border:none;color:#f85149;cursor:pointer;font-size:12px;padding:0 2px;line-height:1;opacity:.6'
        delBtn.title = '删除此约束'
        delBtn.onclick = () => {
          fetch(`/memories/${m.id}`, { method: 'DELETE' })
            .then(() => { card.remove(); fetchMemories() })
        }
        headerEl.appendChild(delBtn)
      }

      const contentEl = document.createElement('div')
      contentEl.className = 'mem-content'
      if (isNew) contentEl.style.color = '#c9d1d9'
      contentEl.textContent = m.content || ''

      const timeEl = document.createElement('div')
      timeEl.className = 'mem-time'
      timeEl.textContent = (m.timestamp || '').slice(0, 16).replace('T', ' ')

      card.appendChild(headerEl)
      card.appendChild(contentEl)
      card.appendChild(timeEl)
      memCol.appendChild(card)
    })
    memCount.textContent = rows.length
    memBadge.textContent = '记忆 ' + rows.length
  }

  function fetchMemories() {
    fetch('/memories?limit=60').then(r => r.json()).then(renderMemories).catch(() => {})
  }
  fetchMemories()
  setInterval(fetchMemories, 5000)

  // ── Brain 列 ──
  function removeBrainEmpty() {
    if (brainEmpty) { brainEmpty = false; document.querySelector('#brain-col .col-empty')?.remove() }
  }

  function addEl(col, tag, cls, html) {
    removeBrainEmpty()
    const el = document.createElement(tag)
    el.className = cls
    if (html !== undefined) el.innerHTML = html
    col.appendChild(el)
    scrollBot(col)
    return el
  }

  function addBrainDivider(label) {
    addEl(brainCol, 'div', 'b-divider', esc(label))
  }

  function addBrainLabel(text) {
    addEl(brainCol, 'div', 'b-label', esc(text))
  }

  // ── Think 列 ──
  let currentThinkEl = null

  function removeThinkEmpty() {
    if (thinkEmpty) { thinkEmpty = false; document.querySelector('#think-col .col-empty')?.remove() }
  }

  function addThinkEl(tag, cls, html) {
    removeThinkEmpty()
    const el = document.createElement(tag)
    el.className = cls
    if (html !== undefined) el.innerHTML = html
    thinkCol.appendChild(el)
    scrollBot(thinkCol)
    return el
  }

  function addThinkDivider(label) {
    addThinkEl('div', 't-divider', esc(label))
  }

  function startThink() {
    removeThinkEmpty()
    finishThink()
    currentThinkEl = document.createElement('div')
    currentThinkEl.className = 'think-row think-cursor'
    thinkCol.appendChild(currentThinkEl)
    scrollBot(thinkCol)
  }

  function appendThink(text) {
    if (!currentThinkEl) startThink()
    currentThinkEl.textContent += text
    scrollBot(thinkCol)
  }

  function finishThink() {
    if (currentThinkEl) {
      currentThinkEl.classList.remove('think-cursor')
      currentThinkEl = null
    }
  }

  function addThinkTool(name, args, result) {
    removeThinkEmpty()
    const wrap = document.createElement('div')
    wrap.className = 't-tool'
    const nameEl = document.createElement('div')
    nameEl.className = 't-tool-name'
    nameEl.textContent = name
    wrap.appendChild(nameEl)
    if (args) {
      const argsEl = document.createElement('div')
      argsEl.className = 't-tool-args'
      argsEl.textContent = typeof args === 'string' ? args : JSON.stringify(args, null, 2)
      wrap.appendChild(argsEl)
    }
    if (result) {
      const resEl = document.createElement('div')
      resEl.className = 't-tool-result'
      resEl.textContent = '→ ' + String(result).replace(/\r?\n/g, ' ↵ ')
      wrap.appendChild(resEl)
    }
    thinkCol.appendChild(wrap)
    scrollBot(thinkCol)
  }

  function addThinkMemories(memories) {
    removeThinkEmpty()
    const wrap = document.createElement('div')
    wrap.className = 't-memories'
    const tag = document.createElement('span')
    tag.className = 't-memories-tag'
    tag.textContent = `记忆写入 +${memories.length}`
    wrap.appendChild(tag)
    memories.forEach(m => {
      const item = document.createElement('div')
      item.className = 't-mem-item'
      item.textContent = m.content || ''
      wrap.appendChild(item)
    })
    thinkCol.appendChild(wrap)
    scrollBot(thinkCol)
  }

  function addThinkMessage(args) {
    removeThinkEmpty()
    const wrap = document.createElement('div')
    wrap.className = 't-message'
    const header = document.createElement('div')
    header.className = 't-message-header'
    const tag = document.createElement('span')
    tag.className = 't-message-tag'
    tag.textContent = `→ ${args.target_id || ''}`
    const time = document.createElement('span')
    time.className = 't-message-time'
    time.textContent = new Date().toLocaleTimeString('zh', { hour12: false })
    header.appendChild(tag)
    header.appendChild(time)
    const body = document.createElement('div')
    body.className = 't-message-body'
    body.textContent = args.content || ''
    wrap.appendChild(header)
    wrap.appendChild(body)
    thinkCol.appendChild(wrap)
    scrollBot(thinkCol)
  }

  // ── Quota ──
  function updateQuota(q) {
    if (!q) return
    const pct = parseFloat(q.ratio)
    quotaBadge.style.color = pct > 90 ? '#f85149' : pct > 60 ? '#e3b341' : '#56d364'
    quotaBadge.textContent = `配额 ${q.ratio} · ${(q.nextTickMs/1000).toFixed(0)}s`
  }

  // ── Event handler ──
  function handle(ev) {
    const { type, data } = ev

    switch (type) {

      case 'connected':
        dot.className = 'status-ring connected'
        break

      case 'tick': {
        const tickLabel = 'TICK · ' + (data.input || '').replace('TICK ', '').slice(0, 19)
        addBrainDivider(tickLabel)
        addThinkDivider(tickLabel)
        break
      }

      case 'message_received': {
        const msgLabel = '消息 · ' + (data.input || '').slice(0, 36)
        addBrainDivider(msgLabel)
        addThinkDivider(msgLabel)
        break
      }

      case 'injector_result': {
        const { directions = [], tools = [], matchedMemories = [], recallMemories = [], constraints = [], thought = null, lastToolResult, conversationWindow = [], personMemory = null } = data

        addBrainLabel('注入器')

        if (thought) {
          const el = document.createElement('div')
          el.className = 'b-thought'
          el.innerHTML = `<span class="b-thought-concept">【${esc(thought.concept)}】</span>${esc(thought.line)}`
          brainCol.appendChild(el)
          scrollBot(brainCol)
        }

        if (constraints.length) {
          constraints.forEach(c => addEl(brainCol, 'div', 'b-constraint', esc(c)))
        }

        if (lastToolResult) {
          addEl(brainCol, 'div', 'b-toolresult', esc(lastToolResult))
        }

        if (personMemory) {
          addEl(brainCol, 'div', 'b-label', '关于对方')
          addEl(brainCol, 'div', 'b-mem-content', esc(personMemory.content))
          if (personMemory.detail) addEl(brainCol, 'div', 'b-mem-detail', esc(personMemory.detail))
        }

        if (conversationWindow.length) {
          addEl(brainCol, 'div', 'b-label', `对话记录 ·${conversationWindow.length}`)
          conversationWindow.forEach(m => {
            const time = (m.timestamp || '').slice(11, 16)
            const isJarvis = m.role === 'jarvis'
            const text = isJarvis
              ? `[${time}] → ${m.to_id}: ${m.content}`
              : `[${time}] ${m.from_id}: ${m.content}`
            addEl(brainCol, 'div', `b-conv-row ${isJarvis ? 'b-conv-jarvis' : 'b-conv-user'}`, esc(text))
          })
        }

        if (directions.length) {
          addEl(brainCol, 'div', 'b-label', '方向')
          directions.forEach(d => addEl(brainCol, 'div', 'b-direction', esc(d)))
        }

        const allMems = [
          ...matchedMemories.map(m => ({ ...m, isRecall: false })),
          ...recallMemories.map(m => ({ ...m, isRecall: true })),
        ]
        if (allMems.length) {
          addEl(brainCol, 'div', 'b-label', `记忆注入 ·${allMems.length}`)
          allMems.forEach(m => {
            removeBrainEmpty()
            const row = document.createElement('div')
            row.className = 'b-mem-row'
            const typeEl = document.createElement('div')
            typeEl.className = 'b-mem-type'
            typeEl.textContent = (m.isRecall ? '[recall] ' : '') + (m.event_type || '').replace(/_/g, ' ')
            const contentEl = document.createElement('div')
            contentEl.className = 'b-mem-content'
            contentEl.textContent = m.content || ''
            row.appendChild(typeEl)
            row.appendChild(contentEl)
            if (m.detail) {
              const detailEl = document.createElement('div')
              detailEl.className = 'b-mem-detail'
              detailEl.textContent = m.detail
              row.appendChild(detailEl)
            }
            brainCol.appendChild(row)
            scrollBot(brainCol)
          })
        }

        if (tools.length) {
          addEl(brainCol, 'div', 'b-tools', esc(tools.join('  ')))
        }
        break
      }

      case 'system_prompt': {
        removeBrainEmpty()
        const details = document.createElement('details')
        details.className = 'b-prompt'
        const summary = document.createElement('summary')
        summary.textContent = `系统提示词 · ${(data.content || '').length} 字符`
        const pre = document.createElement('div')
        pre.className = 'b-prompt-text'
        pre.textContent = data.content || ''
        details.appendChild(summary)
        details.appendChild(pre)
        brainCol.appendChild(details)
        scrollBot(brainCol)
        break
      }

      case 'tool_call': {
        if (data.name === 'send_message') {
          addThinkMessage(data.args || {})
        } else {
          addThinkTool(data.name || '', data.args, data.result)
        }
        break
      }

      case 'memories_written': {
        const mems = data.memories || []
        addBrainLabel(data.count > 0 ? `识别器 · +${data.count}` : '识别器')
        if (mems.length) {
          mems.forEach(m => {
            removeBrainEmpty()
            const row = document.createElement('div')
            row.className = 'b-mem-row'
            const typeEl = document.createElement('div')
            typeEl.className = 'b-mem-type'
            typeEl.style.color = '#ffa657'
            typeEl.textContent = (m.event_type || '').replace(/_/g, ' ')
            const contentEl = document.createElement('div')
            contentEl.className = 'b-rec'
            contentEl.style.cssText = 'padding:0; line-height:1.4'
            contentEl.textContent = m.content || ''
            row.appendChild(typeEl)
            row.appendChild(contentEl)
            if (m.detail) {
              const detailEl = document.createElement('div')
              detailEl.className = 'b-mem-detail'
              detailEl.textContent = m.detail
              row.appendChild(detailEl)
            }
            brainCol.appendChild(row)
            scrollBot(brainCol)
          })
          addThinkMemories(mems)
        } else {
          addEl(brainCol, 'div', 'b-none', '无写入')
        }
        fetchMemories()
        break
      }

      case 'stream_start':
        if (data.mode === 'think') startThink()
        break

      case 'stream_chunk':
        if (currentThinkEl) appendThink(data.text || '')
        break

      case 'stream_end':
        finishThink()
        break

      case 'quota':
        updateQuota(data)
        break

      case 'admin':
        if (typeof data.running === 'boolean') setRunningState(data.running)
        break

      case 'error':
        addBrainLabel('错误')
        addEl(brainCol, 'div', 'b-none', esc(data.error || ''))
        break
    }
  }

  // ── 运行状态 ──
  let jarvisRunning = true

  function setRunningState(running) {
    jarvisRunning = running
    const btnRestart = document.getElementById('btn-restart')
    const btnStop    = document.getElementById('btn-stop')
    if (running) {
      btnRestart.textContent = '重启'
      btnStop.style.display = ''
    } else {
      btnRestart.textContent = '启动'
      btnStop.style.display = 'none'
    }
  }

  function fetchStatus() {
    fetch('/status').then(r => r.json()).then(d => {
      if (typeof d.running === 'boolean') setRunningState(d.running)
    }).catch(() => {})
  }
  fetchStatus()
  setInterval(fetchStatus, 5000)

  function handleRestartOrStart() {
    if (jarvisRunning) {
      adminAction('restart', '重启 Jarvis？页面将短暂断开后自动重连。')
    } else {
      fetch('/admin/start', { method: 'POST' })
        .then(r => r.json())
        .then(d => { if (typeof d.running === 'boolean') setRunningState(d.running) })
        .catch(() => {})
    }
  }

  // ── 管理操作 ──
  let pendingAction = null

  function adminAction(action, msg) {
    pendingAction = action
    document.getElementById('confirm-msg').textContent = msg
    document.getElementById('confirm-overlay').classList.add('show')
  }

  function closeConfirm() {
    pendingAction = null
    document.getElementById('confirm-overlay').classList.remove('show')
  }

  document.getElementById('confirm-ok-btn').onclick = () => {
    if (!pendingAction) return
    const action = pendingAction
    closeConfirm()
    fetch(`/admin/${action}`, { method: 'POST' })
      .then(r => r.json())
      .then(d => {
        if (action === 'reset-memories') fetchMemories()
        if (typeof d.running === 'boolean') setRunningState(d.running)
      })
      .catch(() => {})
  }

  function connect() {
    dot.className = 'status-ring'
    const es = new EventSource('/events')
    es.onmessage = e => { try { handle(JSON.parse(e.data)) } catch {} }
    es.onerror = () => {
      dot.className = 'status-ring error'
      es.close()
      setTimeout(connect, 3000)
    }
  }

  connect()
</script>
</body>
</html>
