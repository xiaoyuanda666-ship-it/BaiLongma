<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日简报 - {date}</title>
    <style>
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #1a1a1a; font-size: 28px; margin-bottom: 8px; }
        .date { color: #666; font-size: 14px; margin-bottom: 24px; }
        .weather { display: flex; align-items: center; gap: 20px; }
        .temp { font-size: 48px; color: #2563eb; font-weight: bold; }
        .desc { color: #666; font-size: 18px; }
        .news h2 { font-size: 18px; color: #1a1a1a; margin-bottom: 16px; border-left: 4px solid #2563eb; padding-left: 12px; }
        .news-item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .news-item:last-child { border-bottom: none; }
        .news-item a { color: #333; text-decoration: none; }
        .news-item a:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>每日简报</h1>
        <p class="date">{date} · 天津</p>
        <div class="weather">
            <span class="temp">{temp}</span>
            <span class="desc">{weather}</span>
        </div>
    </div>
    <div class="card news">
        <h2>今日要闻</h2>
        {news}
    </div>
</body>
</html>
