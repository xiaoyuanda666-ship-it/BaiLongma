<!DOCTYPE html><html><head><meta charset="UTF-8"><title>陆丰天气 - Jarvis</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.weather-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:40px;text-align:center;color:white;max-width:400px;width:100%}.location{font-size:14px;color:#a0a0a0;text-transform:uppercase;letter-spacing:2px}.city{font-size:32px;font-weight:300;margin:20px 0}.weather-icon{font-size:80px;margin:20px 0}.temperature{font-size:72px;font-weight:200}.temperature span{font-size:36px;vertical-align:top}.description{font-size:20px;color:#c0c0c0;margin:20px 0 30px}.details{display:flex;justify-content:space-around;border-top:1px solid rgba(255,255,255,0.1);padding-top:30px}.detail-item{text-align:center}.detail-label{font-size:12px;color:#888;margin-bottom:5px;text-transform:uppercase}.detail-value{font-size:18px;font-weight:500}.feels-like{color:#ff7675}.humidity{color:#74b9ff}.wind{color:#55efc4}</style></head><body><div class="weather-card"><div class="location">📍 广东，中国</div><div class="city">陆丰 Lufeng</div><div class="weather-icon">☀️</div><div class="temperature">18<span>°C</span></div><div class="description">晴朗 · Sunny</div><div class="details"><div class="detail-item"><div class="detail-label">体感温度</div><div class="detail-value feels-like">18°C</div></div><div class="detail-item"><div class="detail-label">湿度</div><div class="detail-value humidity">60%</div></div><div class="detail-item"><div class="detail-label">风速</div><div class="detail-value wind">5 km/h</div></div></div></div></body></html>
