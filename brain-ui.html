<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Brain UI</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg-0: #07111a;
  --bg-1: #0d1c28;
  --bg-2: rgba(9, 19, 29, 0.78);
  --panel: rgba(7, 14, 22, 0.72);
  --line: rgba(169, 186, 210, 0.587);
  --line-strong: rgba(125, 211, 252, 0.28);
  --text: #dbe7f3;
  --muted: #8ea2b7;
  --l1: #69d2ff;
  --l2: #9f8cff;
  --accent: #ff9b5e;
  --success: #63e6a5;
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
  --radius-lg: 24px;
  --radius-md: 18px;
  --radius-sm: 12px;
  --font-ui: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "Cascadia Code", "Consolas", "SFMono-Regular", monospace;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 18%, rgba(80, 168, 255, 0.22), transparent 28%),
    radial-gradient(circle at 82% 12%, rgba(163, 130, 255, 0.18), transparent 26%),
    radial-gradient(circle at 50% 78%, rgba(66, 214, 173, 0.1), transparent 30%),
    linear-gradient(145deg, var(--bg-0), var(--bg-1) 58%, #04090f 100%);
  color: var(--text);
  font-family: var(--font-ui);
  user-select: none;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: 0.28;
  pointer-events: none;
}

#graph {
  position: fixed;
  inset: 0;
  z-index: 0;
  cursor: grab;
}

#graph:active {
  cursor: grabbing;
}

.topbar {
  position: fixed;
  top: 18px;
  left: 18px;
  right: 18px;
  z-index: 25;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 16px;
  pointer-events: none;
}

.brand,
.statusbar {
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(6, 12, 19, 0.62);
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow);
}

.brand {
  min-width: 240px;
}

.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0) 28%),
    conic-gradient(from 180deg, #5ae0ff, #6ba8ff, #7b6cff, #5ae0ff);
  box-shadow: 0 0 24px rgba(105, 210, 255, 0.35);
}

.brand-copy {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.eyebrow {
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.brand h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.statusbar {
  gap: 20px;
}

.status-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.status-item span {
  color: var(--muted);
  font-size: 11px;
}

.status-item strong {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
}

.status-live strong::before {
  content: "";
  display: inline-block;
  width: 8px;
  height: 8px;
  margin-right: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 12px rgba(99, 230, 165, 0.95);
  animation: pulse 1.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.7); opacity: 0.55; }
}

.panel {
  position: fixed;
  top: 92px;
  bottom: 112px;
  width: 320px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  padding: 0 18px 0;
  pointer-events: none;
}

#panel-l1 { left: 0; }
#panel-l2 { right: 0; }

.panel-shell {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, rgba(9, 17, 27, 0.78), rgba(6, 11, 18, 0.68));
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.panel-title {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.panel-title strong {
  font-size: 14px;
  font-weight: 600;
}

.panel-title span {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
}

.badge {
  padding: 6px 10px;
  border: 1px solid currentColor;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.92;
}

#panel-l1 .badge,
#panel-l1 .stream-tool,
#panel-l1 .panel-title strong {
  color: var(--l1);
}

#panel-l2 .badge,
#panel-l2 .stream-tool,
#panel-l2 .panel-title strong {
  color: var(--l2);
}

.stream {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  mask-image: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.25) 15%, black 38%);
  -webkit-mask-image: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.25) 15%, black 38%);
}

.stream-inner {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.stream-block {
  padding: 12px 12px 10px;
  border: 1px solid rgba(148, 163, 184, 0.08);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
  transition: opacity 0.5s ease, transform 0.35s ease;
}

.stream-block.fading {
  opacity: 0.1;
  transform: translateY(-8px);
}

.stream-text {
  line-height: 1.65;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  color: #d8e4f2;
}

.stream-tool {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  opacity: 0.7;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stream-tool::before {
  content: ">";
  margin-right: 6px;
}

#chat-area {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: min(920px, calc(100vw - 72px));
  z-index: 20;
  pointer-events: auto;
}

#chat-shell {
  border: 1px solid var(--line-strong);
  border-radius: 28px;
  background: rgba(18, 28, 40, 0.28);
  backdrop-filter: blur(34px) saturate(145%);
  -webkit-backdrop-filter: blur(34px) saturate(145%);
  box-shadow:
    0 24px 70px rgba(0, 0, 0, 0.34),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
  overflow: hidden;
}

#chat-history {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1);
}

#chat-history.open {
  max-height: 580px;
}

#chat-messages {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 580px;
  overflow-y: auto;
  padding: 16px 18px 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(125, 211, 252, 0.24) transparent;
}

#chat-messages::-webkit-scrollbar {
  width: 8px;
}

#chat-messages::-webkit-scrollbar-thumb {
  background: rgba(125, 211, 252, 0.22);
  border-radius: 999px;
}

.msg {
  max-width: min(80%, 640px);
  padding: 10px 12px;
  border-radius: 16px;
  line-height: 1.65;
  font-size: 13px;
  word-break: break-word;
}

.msg-user {
  align-self: flex-end;
  background: rgba(255, 155, 94, 0.13);
  border: 1px solid rgba(255, 155, 94, 0.18);
  color: #ffd3bd;
}

.msg-jarvis {
  align-self: flex-start;
  background: rgba(99, 230, 165, 0.1);
  border: 1px solid rgba(99, 230, 165, 0.18);
  color: #d9ffe8;
}

.msg-label {
  display: block;
  margin-bottom: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.65;
}

#input-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
}

#msg-input {
  flex: 1;
  min-width: 0;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  font: 500 14px/1.4 var(--font-ui);
  padding: 14px 16px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

#msg-input:focus {
  border-color: rgba(105, 210, 255, 0.4);
  box-shadow: 0 0 0 4px rgba(105, 210, 255, 0.08);
  background: rgba(255, 255, 255, 0.055);
}

#msg-input::placeholder {
  color: rgba(142, 162, 183, 0.74);
}

#send-btn,
#reset-view-btn {
  border: 0;
  border-radius: 16px;
  padding: 13px 16px;
  font: 600 12px/1 var(--font-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
}

#send-btn {
  background: linear-gradient(135deg, #4bd5ff, #8f75ff);
  color: #04111a;
  box-shadow: 0 10px 30px rgba(99, 150, 255, 0.26);
}

#reset-view-btn {
  background: rgba(255, 255, 255, 0.05);
  color: var(--muted);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

#send-btn:hover,
#reset-view-btn:hover {
  transform: translateY(-1px);
}

#send-btn:active,
#reset-view-btn:active {
  transform: translateY(0);
  opacity: 0.85;
}

#tip {
  position: fixed;
  z-index: 200;
  display: none;
  max-width: 260px;
  padding: 10px 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  background: rgba(6, 12, 18, 0.9);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  color: var(--text);
  font-size: 12px;
  line-height: 1.55;
  word-break: break-word;
  pointer-events: none;
}

.tip-type {
  display: inline-block;
  margin-bottom: 4px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@media (max-width: 1180px) {
  .panel {
    width: 272px;
  }

  #chat-area {
    width: min(860px, calc(100vw - 44px));
  }
}

@media (max-width: 980px) {
  .topbar {
    top: 14px;
    left: 14px;
    right: 14px;
    flex-direction: column;
    align-items: stretch;
  }

  .statusbar {
    justify-content: space-between;
  }

  .panel {
    top: auto;
    bottom: 140px;
    width: calc(50vw - 22px);
    height: 210px;
  }

  .panel-shell {
    padding: 14px;
  }

  #panel-l1 { left: 14px; }
  #panel-l2 { right: 14px; }

  #chat-area {
    bottom: 14px;
    width: calc(100vw - 28px);
  }
}

@media (max-width: 720px) {
  body {
    overflow: auto;
  }

  .brand,
  .statusbar {
    border-radius: 24px;
  }

  .statusbar {
    gap: 12px;
    flex-wrap: wrap;
  }

  .panel {
    position: fixed;
    width: calc(100vw - 28px);
    left: 14px;
    right: 14px;
    height: 144px;
  }

  #panel-l1 {
    bottom: 314px;
  }

  #panel-l2 {
    bottom: 156px;
  }

  .panel-shell {
    gap: 10px;
    border-radius: 20px;
  }

  .panel-header {
    align-items: flex-start;
  }

  .panel-title span,
  .badge {
    font-size: 10px;
  }

  #chat-history.open {
    max-height: 480px;
  }

  #chat-messages {
    max-height: 480px;
  }

  #input-row {
    flex-wrap: wrap;
  }

  #msg-input {
    width: 100%;
  }

  #send-btn,
  #reset-view-btn {
    flex: 1;
  }
}
</style>
</head>
<body>

<svg id="graph" aria-label="Jarvis memory graph"></svg>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true"></div>
    <div class="brand-copy">
      <div class="eyebrow">Cognitive Surface</div>
      <h1>Jarvis Brain Interface</h1>
    </div>
  </div>
  <div class="statusbar">
    <div class="status-item status-live">
      <span>状态</span>
      <strong id="conn-state">Connected</strong>
    </div>
    <div class="status-item">
      <span>节点</span>
      <strong id="node-count">0</strong>
    </div>
    <div class="status-item">
      <span>链路</span>
      <strong id="link-count">0</strong>
    </div>
  </div>
</header>

<aside id="panel-l1" class="panel">
  <div class="panel-shell">
    <div class="panel-header">
      <div class="panel-title">
        <strong>L1 感知流</strong>
        <span>快速感知、匹配记忆、工具输入</span>
      </div>
      <div class="badge">Perception</div>
    </div>
    <div class="stream">
      <div class="stream-inner" id="si-l1"></div>
    </div>
  </div>
</aside>

<aside id="panel-l2" class="panel">
  <div class="panel-shell">
    <div class="panel-header">
      <div class="panel-title">
        <strong>L2 推理流</strong>
        <span>深层思考、工具调用、输出组织</span>
      </div>
      <div class="badge">Reasoning</div>
    </div>
    <div class="stream">
      <div class="stream-inner" id="si-l2"></div>
    </div>
  </div>
</aside>

<section id="chat-area">
  <div id="chat-shell">
    <div id="chat-history">
      <div id="chat-messages"></div>
    </div>
    <div id="input-row">
      <input id="msg-input" type="text" placeholder="向 Jarvis 发送消息..." autocomplete="off">
      <button id="reset-view-btn" type="button">Reset View</button>
      <button id="send-btn" type="button">Send</button>
    </div>
  </div>
</section>

<div id="tip"></div>

<script>
const API = "http://localhost:3721";

let W = window.innerWidth;
let H = window.innerHeight;

const svg = d3.select("#graph").attr("width", W).attr("height", H);
const tip = d3.select("#tip");
const connStateEl = document.getElementById("conn-state");
const nodeCountEl = document.getElementById("node-count");
const linkCountEl = document.getElementById("link-count");

svg.append("defs").html(`
  <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>`);

const g = svg.append("g");
const gLink = g.append("g");
const gNode = g.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.08, 5])
  .on("zoom", event => g.attr("transform", event.transform));

svg.call(zoom);
svg.on("wheel.zoom", null);
svg.on("dblclick.zoom", null);
svg.on("mousedown.zoom", null);
svg.on("mousemove.zoom", null);
svg.on("touchstart.zoom", null);
svg.on("touchmove.zoom", null);
svg.on("touchend.zoom", null);

svg.node().addEventListener("wheel", event => {
  event.preventDefault();

  const current = d3.zoomTransform(svg.node());
  const zoomFactor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
  const nextScale = Math.max(0.08, Math.min(5, current.k * zoomFactor));
  const centerX = W / 2;
  const centerY = H / 2;

  const graphCenterX = (centerX - current.x) / current.k;
  const graphCenterY = (centerY - current.y) / current.k;

  const nextX = centerX - graphCenterX * nextScale;
  const nextY = centerY - graphCenterY * nextScale;

  svg.call(
    zoom.transform,
    d3.zoomIdentity.translate(nextX, nextY).scale(nextScale)
  );
}, { passive: false });

function resetZoom() {
  const scale = window.innerWidth < 720 ? 0.82 : 1.0;
  svg.call(
    zoom.transform,
    d3.zoomIdentity
      .translate((W - W * scale) / 2, (H - H * scale) / 2)
      .scale(scale)
  );
}

const TYPE_COLOR = {
  knowledge: "#69d2ff",
  self_constraint: "#ff9b5e",
  fact: "#51e6d7",
  rule: "#ffd166",
  person: "#7fe9a6",
  object: "#ffdc7a",
  error: "#ff7d7d",
  task_knowledge: "#9580ff"
};

const glowSet = new Map();

let linkData = [];
let nodeData = [];
let linkSel = gLink.selectAll("line");
let nodeSel = gNode.selectAll("circle");
let heartbeatPhase = 0;

function updateStats() {
  nodeCountEl.textContent = String(nodeData.length);
  linkCountEl.textContent = String(linkData.length);
}

function setConnectionState(text, live = true) {
  connStateEl.textContent = text;
  connStateEl.parentElement.classList.toggle("status-live", live);
}

function isGlowing(nid) {
  const expiry = glowSet.get(nid);
  if (!expiry) return false;
  if (Date.now() > expiry) {
    glowSet.delete(nid);
    return false;
  }
  return true;
}

function highlightNodes(nids, duration = 2400) {
  if (!nids.length) return;
  const expiry = Date.now() + duration;
  nids.forEach(nid => glowSet.set(nid, expiry));
  sim.alpha(Math.max(sim.alpha(), 0.07)).restart();
  setTimeout(() => {
    nids.forEach(nid => glowSet.delete(nid));
    sim.alpha(Math.max(sim.alpha(), 0.05)).restart();
  }, duration + 80);
}

function nodeColor(d) {
  const base = TYPE_COLOR[d.event_type] || "#5b7085";
  if (isGlowing(d._nid)) {
    const c = d3.color(base);
    if (c) {
      c.opacity = 1;
      return c.brighter(1.05) + "";
    }
    return base;
  }

  const ageSec = (Date.now() - (d._ts || Date.now())) / 1000;
  const c = d3.color(base);
  if (!c) return base;
  c.opacity = 1;
  const dim = Math.max(0.78, 1 - ageSec / 240);
  c.r = Math.round(c.r * dim);
  c.g = Math.round(c.g * dim);
  c.b = Math.round(c.b * dim);
  return c + "";
}

function nodeRadius(d) {
  const minRadius = 4.8;
  const maxRadius = minRadius * 2.6;
  const emphasis = Math.min(1, (d._deg || 0) / 16);
  const base = minRadius + (maxRadius - minRadius) * emphasis;
  return isGlowing(d._nid) ? Math.min(maxRadius, base * 1.08) : base;
}

const sim = d3.forceSimulation()
  .force("link", d3.forceLink().id(d => d._nid).distance(78).strength(0.5))
  .force("charge", d3.forceManyBody().strength(d => -48 - (d._deg || 0) * 14))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("radial", d3.forceRadial(150, W / 2, H / 2).strength(0.085))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 2.4))
  .on("tick", tick);

function tick() {
  linkSel
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  nodeSel
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", nodeRadius)
    .attr("fill", nodeColor)
    .attr("filter", d => isGlowing(d._nid) ? "url(#glow)" : null);
}

function computeDegrees() {
  const nodeById = new Map(nodeData.map(node => [node._nid, node]));
  nodeData.forEach(node => {
    node._deg = 0;
    node._childCount = 0;
  });
  linkData.forEach(link => {
    const source = typeof link.source === "object"
      ? link.source
      : nodeById.get(String(link.source));
    const target = typeof link.target === "object"
      ? link.target
      : nodeById.get(String(link.target));
    if (source) source._deg = (source._deg || 0) + 1;
    if (target) target._deg = (target._deg || 0) + 1;
    if (link._kind === "parent" && target) {
      target._childCount = (target._childCount || 0) + 1;
    }
  });
}

function showTip(event, d) {
  const label = d.title || (d.content || "").slice(0, 88) || d._nid;
  tip
    .style("display", "block")
    .style("left", `${event.clientX + 14}px`)
    .style("top", `${event.clientY + 12}px`)
    .html(`<span class="tip-type">${d.event_type || "memory"}</span><div>${label}</div>`);
}

function renderGraph() {
  computeDegrees();
  updateStats();

  linkSel = linkSel.data(linkData, d => d._lid);
  linkSel.exit().remove();
  linkSel = linkSel.enter().append("line")
    .attr("stroke", d => {
      if (d._kind === "visual_random") return "rgba(91, 112, 133, 0.5)";
      if (d._kind === "agent_visual") return "rgba(98, 90, 132, 0.5)";
      return "rgba(113, 146, 183, 0.32)";
    })
    .attr("stroke-width", d => d._kind === "visual_random" ? 0.38 : (d._kind === "agent_visual" ? 0.5 : 0.9))
    .attr("stroke-dasharray", null)
    .merge(linkSel);

  nodeSel = nodeSel.data(nodeData, d => d._nid);
  nodeSel.exit().transition().duration(280).attr("r", 0).remove();

  const enter = nodeSel.enter().append("circle")
    .attr("r", 0)
    .attr("fill", nodeColor)
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (event, d) => {
        if (!event.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      })
      .on("drag", (event, d) => {
        d.fx = event.x;
        d.fy = event.y;
      })
      .on("end", (event, d) => {
        if (!event.active) sim.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }))
    .on("mouseover", showTip)
    .on("mousemove", event => {
      tip
        .style("left", `${event.clientX + 14}px`)
        .style("top", `${event.clientY + 12}px`);
    })
    .on("mouseout", () => tip.style("display", "none"))
    .on("click", (event, d) => {
      d._ts = Date.now();
      d3.select(event.currentTarget)
        .transition().duration(120).attr("r", nodeRadius(d) + 8)
        .transition().duration(220).attr("r", nodeRadius(d));
    });

  enter.transition().duration(360).attr("r", nodeRadius);
  nodeSel = enter.merge(nodeSel);

  sim.nodes(nodeData);
  sim.force("link").links(linkData);
  sim.alpha(2).restart();
}

function makeLinkId(source, target) {
  return `${source}=>${target}`;
}

function parseEntities(raw) {
  try {
    const parsed = typeof raw === "string" ? JSON.parse(raw || "[]") : (raw || []);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function addAgentVisualLinks(nodeMap, linkSet) {
  const agentNodes = nodeData.filter(node => parseEntities(node.entities).includes("agent:jarvis"));
  if (agentNodes.length < 3) return;

  const ordered = [...agentNodes].sort((a, b) => String(a._nid).localeCompare(String(b._nid)));

  ordered.forEach((node, index) => {
    const targetA = ordered[(index + 2) % ordered.length];
    const targetB = ordered[(index * 2 + 3) % ordered.length];

    [targetA, targetB].forEach(target => {
      if (!target || target._nid === node._nid) return;
      const lid = `visual:${node._nid}=>${target._nid}`;
      const reverse = `visual:${target._nid}=>${node._nid}`;
      if (linkSet.has(lid) || linkSet.has(reverse)) return;

      linkSet.add(lid);
      linkData.push({
        source: node._nid,
        target: target._nid,
        _lid: lid,
        _kind: "agent_visual",
      });
    });
  });
}

function deterministicIndex(seed, mod) {
  let hash = 2166136261;
  const text = String(seed);
  for (let i = 0; i < text.length; i++) {
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return Math.abs(hash >>> 0) % mod;
}

function addRandomVisualLinks(linkSet) {
  if (nodeData.length < 4) return;

  const ordered = [...nodeData].sort((a, b) => String(a._nid).localeCompare(String(b._nid)));

  ordered.forEach((source, sourceIndex) => {
    const linksPerNode = 1 + deterministicIndex(`count:${source._nid}`, 3);
    for (let j = 0; j < linksPerNode; j++) {
      const offsetBase = 2 + j * 2;
      const offsetJitter = deterministicIndex(`${source._nid}:${j}`, Math.max(3, ordered.length - 1));
      const offset = (offsetBase + offsetJitter) % ordered.length;
      const target = ordered[(sourceIndex + offset) % ordered.length];
      if (!source || !target || source._nid === target._nid) continue;

      const lid = `visual:${source._nid}=>${target._nid}`;
      const reverse = `visual:${target._nid}=>${source._nid}`;
      if (linkSet.has(lid) || linkSet.has(reverse)) continue;

      linkSet.add(lid);
      linkData.push({
        source: source._nid,
        target: target._nid,
        _lid: lid,
        _kind: "visual_random",
      });
    }
  });
}

async function loadMemories() {
  try {
    const rows = await fetch(`${API}/memories?limit=120`).then(r => r.json());
    if (!Array.isArray(rows)) return;

    const nodeMap = new Map();
    const prevPositions = new Map(nodeData.map(node => [
      node._nid,
      { x: node.x, y: node.y, vx: node.vx, vy: node.vy }
    ]));

    nodeData = rows.map(row => {
      const nid = row.mem_id || String(row.id);
      const prev = prevPositions.get(nid);
      return {
        ...row,
        _nid: nid,
        _ts: prev ? Date.now() : Date.now() - Math.random() * 8000,
        x: prev ? prev.x : W / 2 + (Math.random() - 0.5) * 120,
        y: prev ? prev.y : H / 2 + (Math.random() - 0.5) * 120,
        vx: prev ? prev.vx : 0,
        vy: prev ? prev.vy : 0
      };
    });

    nodeData.forEach(node => {
      nodeMap.set(node._nid, node);
      nodeMap.set(String(node.id), node);
    });

    const linkSet = new Set();
    linkData = [];

    addAgentVisualLinks(nodeMap, linkSet);
    addRandomVisualLinks(linkSet);

    renderGraph();
  } catch (error) {
    console.warn("[graph] load failed:", error.message);
  }
}

function addNewNodes(memories) {
  const nodeMap = new Map(nodeData.map(node => [node._nid, node]));
  const newNids = [];

  memories.forEach(memory => {
    const nid = memory.id || memory.mem_id;
    if (!nid || nodeMap.has(String(nid))) return;

    const node = {
      ...memory,
      _nid: String(nid),
      mem_id: String(nid),
      event_type: memory.event_type || memory.type || "fact",
      _ts: Date.now(),
      x: W / 2 + (Math.random() - 0.5) * 80,
      y: H / 2 + (Math.random() - 0.5) * 80,
      vx: 0,
      vy: 0
    };

    nodeData.push(node);
    nodeMap.set(node._nid, node);
    newNids.push(node._nid);
  });

  if (!newNids.length) return;

  const linkSet = new Set(linkData.map(link => link._lid));
  addAgentVisualLinks(nodeMap, linkSet);
  addRandomVisualLinks(linkSet);

  renderGraph();
  highlightNodes(newNids, 3500);
}

class ThoughtStream {
  constructor(innerId) {
    this.el = document.getElementById(innerId);
    this.curBlock = null;
    this.curText = null;
    this.MAX = 6;
  }

  trim() {
    while (this.el.children.length > this.MAX) {
      const old = this.el.firstChild;
      old.classList.add("fading");
      setTimeout(() => old.remove(), 520);
      break;
    }
  }

  newBlock() {
    this.trim();
    this.curBlock = document.createElement("div");
    this.curBlock.className = "stream-block";

    this.curText = document.createElement("div");
    this.curText.className = "stream-text";

    this.curBlock.appendChild(this.curText);
    this.el.appendChild(this.curBlock);
  }

  append(text) {
    if (!this.curText) this.newBlock();
    this.curText.textContent += text;
  }

  tool(name, args) {
    const line = document.createElement("div");
    line.className = "stream-tool";
    const summary = Object.entries(args || {})
      .slice(0, 2)
      .map(([k, v]) => `${k}=${String(v).slice(0, 28)}`)
      .join(" ");
    line.textContent = `${name}(${summary})`;
    (this.curBlock || this.el).appendChild(line);
  }

  end() {
    this.curBlock = null;
    this.curText = null;
  }
}

const L1 = new ThoughtStream("si-l1");
const L2 = new ThoughtStream("si-l2");

function connectSSE() {
  setConnectionState("Connected", true);
  const es = new EventSource(`${API}/events`);

  es.onopen = () => setConnectionState("Streaming", true);

  es.onmessage = event => {
    try {
      handle(JSON.parse(event.data));
    } catch (_) {}
  };

  es.onerror = () => {
    setConnectionState("Reconnecting", false);
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

function extractNids(memList) {
  return (memList || [])
    .map(memory => memory.mem_id || (memory.id != null ? String(memory.id) : null))
    .filter(Boolean);
}

function handle({ type, data = {} }) {
  switch (type) {
    case "layer1_start":
      L1.newBlock();
      break;
    case "layer1_chunk":
      L1.append(data.text || "");
      break;
    case "layer1_stream_end":
      L1.end();
      break;
    case "layer1_tool":
      L1.tool(data.name, data.args);
      break;
    case "layer1_injector_result": {
      const nids = extractNids(data.matchedMemories);
      if (nids.length) highlightNodes(nids, 1800);
      break;
    }
    case "layer2_start":
      L2.newBlock();
      break;
    case "stream_chunk":
      L2.append(data.text || "");
      break;
    case "stream_end":
      L2.end();
      break;
    case "tool_call":
      L2.tool(data.name, data.args);
      break;
    case "injector_result": {
      const nids = [
        ...extractNids(data.matchedMemories),
        ...extractNids(data.recallMemories)
      ];
      if (nids.length) highlightNodes(nids, 2200);
      break;
    }
    case "memories_written":
      if (Array.isArray(data.memories) && data.memories.length) {
        addNewNodes(data.memories);
      }
      break;
    case "message":
      if (data.from === "consciousness") {
        addMsg("jarvis", data.content);
        openChat(true);
      }
      break;
    default:
      break;
  }
}

const chatHistory = document.getElementById("chat-history");
const chatMessages = document.getElementById("chat-messages");
const msgInput = document.getElementById("msg-input");
const chatArea = document.getElementById("chat-area");
const sendBtn = document.getElementById("send-btn");
const resetViewBtn = document.getElementById("reset-view-btn");

let closeTimer = null;
let hasPendingJarvisMessage = false;
let pendingMessageDismissed = false;
let audioCtx = null;
const CHAT_STORAGE_KEY = "jarvis-brain-ui-chat-history";
const MAX_CHAT_HISTORY = 60;

function ensureAudioContext() {
  if (!audioCtx) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return null;
    audioCtx = new AudioCtx();
  }
  return audioCtx;
}

async function playJarvisAlert() {
  const ctx = ensureAudioContext();
  if (!ctx) return;

  try {
    if (ctx.state === "suspended") await ctx.resume();
  } catch (error) {
    console.warn("[audio]", error.message);
    return;
  }

  const now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.gain.exponentialRampToValueAtTime(0.055, now + 0.02);
  master.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
  master.connect(ctx.destination);

  const oscA = ctx.createOscillator();
  oscA.type = "sine";
  oscA.frequency.setValueAtTime(740, now);
  oscA.frequency.exponentialRampToValueAtTime(880, now + 0.18);
  oscA.connect(master);

  const oscB = ctx.createOscillator();
  oscB.type = "triangle";
  oscB.frequency.setValueAtTime(1110, now + 0.12);
  oscB.frequency.exponentialRampToValueAtTime(1320, now + 0.34);
  oscB.connect(master);

  oscA.start(now);
  oscA.stop(now + 0.22);
  oscB.start(now + 0.12);
  oscB.stop(now + 0.36);

  oscA.addEventListener("ended", () => oscA.disconnect(), { once: true });
  oscB.addEventListener("ended", () => oscB.disconnect(), { once: true });
  setTimeout(() => master.disconnect(), 500);
}

function isTyping() {
  return document.activeElement === msgInput || msgInput.value.trim().length > 0;
}

function loadStoredChatHistory() {
  try {
    const raw = localStorage.getItem(CHAT_STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(item =>
      item &&
      (item.role === "user" || item.role === "jarvis") &&
      typeof item.text === "string"
    ).slice(-MAX_CHAT_HISTORY);
  } catch (error) {
    console.warn("[chat-storage]", error.message);
    return [];
  }
}

function saveStoredChatHistory() {
  try {
    const history = Array.from(chatMessages.children).map(node => ({
      role: node.classList.contains("msg-user") ? "user" : "jarvis",
      text: Array.from(node.childNodes)
        .filter(child => child.nodeType === Node.TEXT_NODE)
        .map(child => child.textContent || "")
        .join("")
    })).slice(-MAX_CHAT_HISTORY);
    localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(history));
  } catch (error) {
    console.warn("[chat-storage]", error.message);
  }
}

function openChat(autoClose = false) {
  chatHistory.classList.add("open");
  if (closeTimer) {
    clearTimeout(closeTimer);
    closeTimer = null;
  }
  if (autoClose && (!hasPendingJarvisMessage || pendingMessageDismissed) && !isTyping()) scheduleClose(4500);
}

function closeChat() {
  if ((hasPendingJarvisMessage && !pendingMessageDismissed) || isTyping()) return;
  chatHistory.classList.remove("open");
}

function scheduleClose(ms = 2400) {
  if ((hasPendingJarvisMessage && !pendingMessageDismissed) || isTyping()) return;
  if (closeTimer) clearTimeout(closeTimer);
  closeTimer = setTimeout(closeChat, ms);
}

chatArea.addEventListener("mouseenter", () => {
  if (closeTimer) {
    clearTimeout(closeTimer);
    closeTimer = null;
  }
  openChat();
});

chatArea.addEventListener("mouseleave", () => scheduleClose());
msgInput.addEventListener("focus", () => openChat());
msgInput.addEventListener("blur", () => {
  if (!isTyping()) scheduleClose();
});
msgInput.addEventListener("input", () => {
  if (isTyping()) {
    openChat();
  } else if (!hasPendingJarvisMessage || pendingMessageDismissed) {
    scheduleClose();
  }
});

function addMsg(role, text) {
  addMsgWithOptions(role, text);
}

function addMsgWithOptions(role, text, options = {}) {
  const { persist = true, alert = role === "jarvis", pending = true } = options;
  const div = document.createElement("div");
  div.className = `msg msg-${role}`;
  div.innerHTML = `<span class="msg-label">${role === "user" ? "You" : "Jarvis"}</span>`;
  div.appendChild(document.createTextNode(text));
  chatMessages.appendChild(div);

  while (chatMessages.children.length > MAX_CHAT_HISTORY) {
    chatMessages.removeChild(chatMessages.firstChild);
  }

  if (role === "jarvis") {
    hasPendingJarvisMessage = pending;
    pendingMessageDismissed = !pending;
    if (alert) playJarvisAlert();
    if (pending) openChat();
  } else if (role === "user") {
    hasPendingJarvisMessage = false;
    pendingMessageDismissed = false;
  }

  chatMessages.scrollTop = chatMessages.scrollHeight;
  if (persist) saveStoredChatHistory();
}

function restoreChatHistory() {
  const history = loadStoredChatHistory();
  history.forEach(item => addMsgWithOptions(item.role, item.text, {
    persist: false,
    alert: false,
    pending: false
  }));

  if (history.length) {
    pendingMessageDismissed = true;
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
}

async function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  msgInput.value = "";
  addMsg("user", text);
  openChat();
  scheduleClose(1000);

  try {
    await fetch(`${API}/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: text, from_id: "ID:000001" })
    });
  } catch (error) {
    console.warn("[send]", error.message);
    addMsg("jarvis", "消息发送失败，请检查本地服务是否启动。");
    openChat(true);
  }
}

sendBtn.addEventListener("click", send);
resetViewBtn.addEventListener("click", resetZoom);
msgInput.addEventListener("keydown", event => {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    send();
  }
});

document.addEventListener("pointerdown", event => {
  if (!hasPendingJarvisMessage || isTyping()) return;
  if (chatArea.contains(event.target)) return;
  pendingMessageDismissed = true;
  closeChat();
});

window.addEventListener("resize", () => {
  W = window.innerWidth;
  H = window.innerHeight;
  svg.attr("width", W).attr("height", H);
  sim.force("center", d3.forceCenter(W / 2, H / 2))
    .force("radial", d3.forceRadial(150, W / 2, H / 2).strength(0.085));
  sim.alpha(0.4).restart();
});

loadMemories();
connectSSE();
restoreChatHistory();
resetZoom();
</script>
