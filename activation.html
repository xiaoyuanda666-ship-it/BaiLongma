<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bailongma 激活</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(107, 174, 255, 0.12), transparent 32%),
        radial-gradient(circle at 82% 78%, rgba(50, 112, 255, 0.10), transparent 34%),
        linear-gradient(160deg, #081019 0%, #0b1420 58%, #060b12 100%);
      color: #e7edf7;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      width: 520px;
      max-width: 100%;
      padding: 32px;
      border-radius: 22px;
      border: 1px solid rgba(150, 185, 255, 0.18);
      background: rgba(10, 17, 27, 0.8);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
      color: #f5f8fd;
    }
    .subtitle {
      margin: 0 0 28px;
      font-size: 15px;
      color: #9db0c8;
    }
    .row {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #b1c1d7;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    select,
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(132, 161, 204, 0.24);
      border-radius: 12px;
      background: rgba(16, 25, 38, 0.94);
      color: #edf4ff;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    select:focus,
    input:focus {
      border-color: rgba(117, 168, 255, 0.72);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f8cff 0%, #3572ff 100%);
      color: #ffffff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
    .status {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      color: #9db0c8;
    }
    .status.err { color: #ff8f8f; }
    .status.ok { color: #74d89f; }
    .model-note {
      margin: 0 0 24px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(16, 25, 38, 0.78);
      border: 1px solid rgba(132, 161, 204, 0.14);
      font-size: 14px;
      color: #d8e4f5;
    }
    .model-note code {
      color: #9fcbff;
      font-weight: 600;
    }
    .hint {
      margin-top: 18px;
      color: #8396ae;
      font-size: 13px;
    }
    .hint code {
      color: #9fcbff;
    }
  </style>
</head>
<body>
  <main>
    <h1>激活 Bailongma</h1>
    <p class="subtitle">填写 DeepSeek Key 即可完成激活。</p>

    <div class="model-note">
      模型：<code>deepseek-v4-flash</code>（思考模式）
    </div>

    <div class="row">
      <label for="apiKey">DeepSeek Key</label>
      <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="请输入 DeepSeek Key" />
    </div>

    <button id="activate" disabled>验证并进入</button>
    <div id="status" class="status"></div>

    <p class="hint">
      激活信息会保存在本地 <code>config.json</code>，仅用于连接 DeepSeek API。
    </p>
  </main>

  <script>
    const ACTIVATION_WARMUP_KEY = 'bailongma_activation_warmup_until'
    const ACTIVATION_WARMUP_MS = 2500
    const MODEL = 'deepseek-v4-flash'
    const apiKeyInput = document.getElementById('apiKey')
    const btn = document.getElementById('activate')
    const statusEl = document.getElementById('status')

    fetch('/activation-status')
      .then(r => r.json())
      .then(data => {
        if (data.activated) window.location.replace('/brain-ui')
      })
      .catch(() => {})

    function setStatus(text, kind) {
      statusEl.textContent = text
      statusEl.className = 'status' + (kind ? ' ' + kind : '')
    }

    function syncButtonState() {
      btn.disabled = apiKeyInput.value.trim().length === 0
    }

    async function activate() {
      const apiKey = apiKeyInput.value.trim()
      if (!apiKey) return

      btn.disabled = true
      setStatus('正在验证 DeepSeek Key…')

      try {
        const resp = await fetch('/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey, model: MODEL }),
        })
        const data = await resp.json().catch(() => ({}))
        if (!resp.ok || !data.ok) {
          setStatus(data.error || '激活失败', 'err')
          syncButtonState()
          return
        }

        try {
          sessionStorage.setItem(ACTIVATION_WARMUP_KEY, String(Date.now() + ACTIVATION_WARMUP_MS))
        } catch {}

        setStatus(`激活成功，已切换到 ${data.model}（思考模式）`, 'ok')
        setTimeout(() => window.location.replace('/brain-ui'), 700)
      } catch (err) {
        setStatus('网络错误：' + err.message, 'err')
        syncButtonState()
      }
    }

    btn.addEventListener('click', activate)
    apiKeyInput.addEventListener('input', syncButtonState)
    apiKeyInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !btn.disabled) activate()
    })
    syncButtonState()
    apiKeyInput.focus()
  </script>
</body>
</html>
