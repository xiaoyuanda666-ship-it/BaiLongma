<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
<title>Consciousness Monitor</title>
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --bg3: #161b22;
    --border: #21262d;
    --text: #c9d1d9;
    --text2: #8b949e;
    --text3: #484f58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    height: -webkit-fill-available;
  }
  body {
    height: 100%;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    background: rgba(8,12,16,0.94);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .status-ring {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background .4s, box-shadow .4s;
  }
  .status-ring.connected {
    background: #2ea043;
    box-shadow: 0 0 0 3px rgba(46,160,67,.22);
    animation: pulse 2.6s ease-in-out infinite;
  }
  .status-ring.error { background: #da3633; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(46,160,67,.22); }
    50%      { box-shadow: 0 0 0 7px rgba(46,160,67,.06); }
  }

  header h1 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #memory-badge {
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-variant-numeric: tabular-nums;
  }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 3px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: border-color .2s, color .2s;
  }
  #clear-btn:hover { border-color: var(--text2); color: var(--text2); }

  /* ── Feed ── */
  #feed {
    flex: 1;
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;       /* Firefox */
    -ms-overflow-style: none;    /* IE/Edge */
    padding: 12px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }
  #feed::-webkit-scrollbar { display: none; }  /* Chrome/Safari */

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 4px;
    color: var(--text3);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Event Card ── */
  .event {
    padding: 8px 12px;
    border-radius: 7px;
    border: 1px solid transparent;
    border-left: 3px solid transparent;
    animation: slideIn 0.16s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: none; }
  }

  /* 顶行：tag + 时间 */
  .event-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .event-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-radius: 3px;
    padding: 1px 6px;
    flex-shrink: 0;
  }

  .event-time {
    font-size: 10px;
    color: var(--text3);
    font-variant-numeric: tabular-nums;
  }

  /* 内容区 */
  .event-content {
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    line-height: 1.55;
  }

  /* 流式光标 */
  .cursor::after {
    content: '▋';
    animation: blink .9s step-end infinite;
    opacity: .7;
    font-size: 11px;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:.7} 50%{opacity:0} }

  /* ── Type themes ── */
  .ev-tick {
    background: none;
    border: none;
    padding: 0;
    margin: 0;
  }
  .ev-tick .event-header { display: none; }
  .ev-tick .event-content {
    color: var(--text2);
    font-size: 10px;
    line-height: 1.3;
    letter-spacing: 0.04em;
  }

  .ev-think {
    background: none;
    border: none;
    padding: 2px 0;
    border-radius: 0;
    margin: 1px 0;
  }
  .ev-think .event-header { display: none; }
  .ev-think .event-content {
    color: #8b6fc5;
    font-size: 11px;
    line-height: 1.5;
  }

  .ev-response {
    background: none;
    border: none;
    padding: 2px 0;
    border-radius: 0;
    margin: 1px 0;
  }
  .ev-response .event-header { display: none; }
  .ev-response .event-content { color: #4ac157; font-size: 13px; line-height: 1.6; }

  .ev-tool_call {
    background: none;
    border: none;
    padding: 1px 0;
    border-radius: 0;
    margin: 1px 0;
  }
  .ev-tool_call .event-header { display: none; }
  .ev-tool_call .event-content { color: #c09030; font-size: 11px; }
  .ev-tool_call .tool-args { background: none; padding: 0; border: none; color: #a07828; overflow-x: hidden; white-space: pre-wrap; }
  .ev-tool_call .tool-result { border-left: none; padding-left: 0; color: #a07828; overflow-x: hidden; }

  .ev-message {
    background: #130e08;
    border-color: #271c0a;
    border-left-color: #f0883e;
  }
  .ev-message .event-tag { background: #271c0a; color: #ffa657; }
  .ev-message .event-content { color: #e8924a; }

  .ev-message_received {
    background: #0b1624;
    border-color: #152033;
    border-left-color: #388bfd;
  }
  .ev-message_received .event-tag { background: #152033; color: #79c0ff; }
  .ev-message_received .event-content { color: #6aafee; }

  .ev-memories_written {
    background: #091510;
    border-color: #162a1c;
    border-left-color: #238636;
  }
  .ev-memories_written .event-tag { background: #162a1c; color: #56d364; }
  .ev-memories_written .event-content { color: #56d364; }

  .ev-recall_requested {
    background: #140a0a;
    border-color: #2a1212;
    border-left-color: #da3633;
  }
  .ev-recall_requested .event-tag { background: #2a1212; color: #f85149; }
  .ev-recall_requested .event-content { color: #e04540; }

  .ev-persona_updated {
    background: #09131d;
    border-color: #12233a;
    border-left-color: #1f6feb;
  }
  .ev-persona_updated .event-tag { background: #12233a; color: #79c0ff; }
  .ev-persona_updated .event-content { color: #79c0ff; }

  .ev-error {
    background: #140a0a;
    border-color: #2a1212;
    border-left-color: #da3633;
  }
  .ev-error .event-tag { background: #2a1212; color: #f85149; }
  .ev-error .event-content { color: #e04540; }

  /* ── 发出的消息 ── */
  .ev-message.outgoing {
    align-self: flex-end;
    max-width: 85%;
    text-align: right;
  }

  /* ── Audio card ── */
  .ev-audio_created {
    background: #0a1020;
    border-color: #1a2a4a;
    border-left-color: #388bfd;
  }
  .ev-audio_created .event-tag { background: #1a2a4a; color: #79c0ff; }
  .ev-audio_created .event-content { color: #79c0ff; }
  .audio-text-preview {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
    font-style: italic;
  }
  .audio-player {
    width: 100%;
    height: 32px;
    border-radius: 4px;
    accent-color: #388bfd;
  }
  /* 音频激活提示（浏览器 autoplay 策略限制时显示） */
  #audio-unlock {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a2a4a;
    color: #79c0ff;
    border: 1px solid #388bfd;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    cursor: pointer;
    z-index: 100;
    animation: slideIn 0.2s ease;
  }

  /* ── Tool detail ── */
  .tool-name {
    font-weight: 700;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    font-size: 12px;
  }
  .tool-args {
    margin-top: 4px;
    font-size: 11px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .tool-result {
    margin-top: 4px;
    font-size: 11px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    overflow: hidden;
    white-space: normal;
    word-break: break-all;
  }

  /* ── Memory items ── */
  .memory-item {
    font-size: 12px;
    color: #56d364;
    padding: 1px 0;
  }
  .memory-item::before { content: '↳ '; opacity: .5; }

  /* ── Composer ── */
  #composer {
    flex-shrink: 0;
    background: rgba(8,12,16,.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    transition: transform 0.15s ease;
    will-change: transform;
  }
  #composer-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #composer-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    padding: 8px 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .2s;
  }
  #composer-input:focus { border-color: var(--text3); }
  #composer-input::placeholder { color: var(--text3); }
  #composer-send {
    background: #238636;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-family: inherit;
    padding: 8px 16px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .2s;
    height: 36px;
  }
  #composer-send:hover { background: #2ea043; }
  #composer-send:disabled { background: var(--bg3); color: var(--text3); cursor: default; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    header { padding: 9px 13px; }
    #feed { padding: 8px 10px 12px; }
    .event { padding: 7px 10px; }
    .event-content { font-size: 12px; }
    .tool-args, .tool-result { font-size: 10px; }
    #clear-btn { display: none; }
    #composer { padding: 8px 10px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
    #composer-send { padding: 8px 12px; }
  }

  /* ── Empty ── */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text3);
    font-size: 13px;
    padding: 80px 20px;
  }
  #empty .icon { font-size: 28px; opacity: .3; }

  #bottom-anchor { height: 12px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="status-ring" id="status-dot"></div>
  <h1>Consciousness Monitor</h1>
  <div class="header-right">
    <span id="quota-badge" style="font-size:11px;font-variant-numeric:tabular-nums;color:var(--text3)">配额 —</span>
    <span id="memory-badge">记忆 —</span>
    <button id="clear-btn" onclick="clearFeed()">清空</button>
  </div>
</header>

<div id="audio-unlock" onclick="unlockAudio()">🔊 点击启用自动播放</div>

<div id="feed">
  <div id="empty"><div class="icon">◎</div><div>等待连接…</div></div>
  <div id="bottom-anchor"></div>
</div>

<div id="composer">
  <div id="composer-inner">
    <textarea id="composer-input" rows="1" placeholder="给 Jarvis 发消息…"></textarea>
    <button id="composer-send">发送</button>
  </div>
</div>

<script>
  const feed = document.getElementById('feed')
  const anchor = document.getElementById('bottom-anchor')
  const dot = document.getElementById('status-dot')
  const badge = document.getElementById('memory-badge')
  const unlockBtn = document.getElementById('audio-unlock')

  let autoScroll = true
  let hasEvents = false

  // ── 音频播放队列 ──
  let audioUnlocked = false
  const audioQueue = []
  let audioPlaying = false

  function unlockAudio() {
    audioUnlocked = true
    unlockBtn.style.display = 'none'
    playNextInQueue()
  }

  // 用户任意交互即视为解锁
  document.addEventListener('click', () => {
    if (!audioUnlocked) {
      audioUnlocked = true
      unlockBtn.style.display = 'none'
      playNextInQueue()
    }
  }, { once: true })

  function playNextInQueue() {
    if (audioPlaying || audioQueue.length === 0) return
    const { url, cardEl } = audioQueue.shift()
    audioPlaying = true
    const audio = new Audio(url)
    audio.onended = () => { audioPlaying = false; playNextInQueue() }
    audio.onerror = () => { audioPlaying = false; playNextInQueue() }
    audio.play().catch(() => { audioPlaying = false })
    // 在卡片里更新播放状态
    if (cardEl) {
      const tag = cardEl.querySelector('.event-tag')
      if (tag) tag.textContent = '▶ 播放中'
      audio.onended = () => {
        audioPlaying = false
        if (tag) tag.textContent = '声音'
        playNextInQueue()
      }
    }
  }

  function queueAudio(url, cardEl) {
    audioQueue.push({ url, cardEl })
    if (!audioUnlocked) {
      unlockBtn.style.display = 'block'
    } else {
      playNextInQueue()
    }
  }
  // 流式状态：{ el, contentEl, type }
  let streamEl = null
  let hadStream = false  // 本轮是否用过流式，用于 response 事件去重

  feed.addEventListener('scroll', () => {
    const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80
    autoScroll = nearBottom
  })

  function scrollToBottom() {
    if (autoScroll) anchor.scrollIntoView({ behavior: 'smooth' })
  }

  function removeEmpty() {
    if (!hasEvents) {
      hasEvents = true
      document.getElementById('empty')?.remove()
    }
  }

  function clearFeed() {
    document.querySelectorAll('.event, .divider').forEach(e => e.remove())
    hasEvents = false
    const el = document.createElement('div')
    el.id = 'empty'
    el.innerHTML = '<div class="icon">◎</div><div>等待事件…</div>'
    feed.insertBefore(el, anchor)
    streamEl = null
  }

  function ts(isoStr) {
    return new Date(isoStr).toLocaleTimeString('zh-CN', {
      hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
    })
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function addDivider(label) {
    removeEmpty()
    const el = document.createElement('div')
    el.className = 'divider'
    el.textContent = label
    feed.insertBefore(el, anchor)
    scrollToBottom()
  }

  // 创建卡片，返回 { card, contentEl }
  function createCard(type, tag, time) {
    removeEmpty()
    const card = document.createElement('div')
    card.className = `event ev-${type}`
    const header = document.createElement('div')
    header.className = 'event-header'
    header.innerHTML = `<span class="event-tag">${esc(tag)}</span><span class="event-time">${esc(time)}</span>`
    const contentEl = document.createElement('div')
    contentEl.className = 'event-content'
    card.appendChild(header)
    card.appendChild(contentEl)
    feed.insertBefore(card, anchor)
    scrollToBottom()
    return { card, contentEl }
  }

  function addEvent(type, tag, bodyHtml, time) {
    const { contentEl } = createCard(type, tag, time)
    contentEl.innerHTML = bodyHtml
    scrollToBottom()
  }

  // 流式：开始一个可追加内容的卡片
  function startStream(type, tag, time) {
    finishStream() // 先结束上一个
    hadStream = true
    const { card, contentEl } = createCard(type, tag, time)
    contentEl.classList.add('cursor')
    streamEl = { card, contentEl, type }
    scrollToBottom()
  }

  // 流式：追加文本
  function appendStream(text) {
    if (!streamEl) return
    streamEl.contentEl.textContent += text
    scrollToBottom()
  }

  // 流式：结束，移除光标；think 卡片加折叠控件
  function finishStream() {
    if (!streamEl) return
    const { contentEl, card, type } = streamEl
    contentEl.classList.remove('cursor')
    streamEl = null
  }

  function parseThink(content) {
    const m = content.match(/<think>([\s\S]*?)<\/think>/i)
    const think = m ? m[1].trim() : null
    const body = content.replace(/<think>[\s\S]*?<\/think>/gi, '').trim()
    return { think, body }
  }

  function fmtArgs(args) {
    if (!args || !Object.keys(args).length) return ''
    try { return JSON.stringify(args, null, 2) } catch { return String(args) }
  }

  function handle(ev) {
    const t = ts(ev.ts)
    const { type, data } = ev

    switch (type) {

      case 'connected':
        dot.className = 'status-ring connected'
        addDivider('已连接 · ' + t)
        fetchStatus()
        break

      case 'tick':
        finishStream()
        addEvent('tick', 'TICK', esc(data.input || ''), t)
        break

      case 'message_received':
        finishStream()
        addDivider('─── 新轮次 ───')
        addEvent('message_received', '收到', esc(data.input || ''), t)
        break

      case 'tool_call': {
        finishStream()
        if (data.name === 'send_message') break  // 发送卡由 message 事件处理，不重复显示
        const args = fmtArgs(data.args)
        const res = String(data.result ?? '').slice(0, 600).replace(/\r?\n/g, ' ↵ ')
        const html =
          `<span class="tool-name">${esc(data.name)}</span>` +
          (args ? `<pre class="tool-args">${esc(args)}</pre>` : '') +
          (res  ? `<div class="tool-result">${esc(res)}</div>` : '')
        addEvent('tool_call', '工具调用', html, t)
        break
      }

      // 流式 token
      case 'stream_start':
        startStream(data.mode === 'think' ? 'think' : 'response',
                    data.mode === 'think' ? '思考' : '输出', t)
        break

      case 'stream_chunk':
        appendStream(data.text || '')
        break

      case 'stream_end':
        finishStream()
        fetchStatus()
        break

      // 非流式兜底（stream 未启用时才渲染，避免与流式重复）
      case 'response': {
        finishStream()
        if (!hadStream) {
          const { think, body } = parseThink(data.content || '')
          if (think) addEvent('think',    '思考', esc(think), t)
          if (body)  addEvent('response', '输出', esc(body),  t)
        }
        hadStream = false
        fetchStatus()
        break
      }

      case 'message':
        finishStream()
        playMessageTone()
        addEvent('message', `发送 → ${esc(data.to || '')}`, esc(data.content || ''), t)
        break

      case 'memories_written': {
        if (!data.count) break
        finishStream()
        const items = (data.memories || [])
          .map(m => `<div class="memory-item">${esc(m.content || '')}</div>`)
          .join('')
        addEvent('memories_written', `记忆 +${data.count}`, items, t)
        break
      }

      case 'recall_requested':
        finishStream()
        addEvent('recall_requested', 'RECALL', esc(data.query || ''), t)
        break

      case 'persona_updated':
        finishStream()
        addEvent('persona_updated', '自我定义', esc((data.persona || '').slice(0, 200)), t)
        break

      case 'error':
        finishStream()
        addEvent('error', '错误', esc(data.error || ''), t)
        break

      case 'audio_created': {
        finishStream()
        const audioUrl = '/' + (data.path || '').replace(/\\/g, '/')
        const preview = data.text ? `<div class="audio-text-preview">"${esc(data.text)}…"</div>` : ''
        const { card, contentEl } = createCard('audio_created', '声音', t)
        contentEl.innerHTML = preview + `<audio class="audio-player" controls src="${esc(audioUrl)}"></audio>`
        scrollToBottom()
        queueAudio(audioUrl, card)
        break
      }

      case 'quota':
        updateQuota(data)
        break
    }
  }

  const quotaBadge = document.getElementById('quota-badge')

  function updateQuota(q) {
    if (!q) return
    quotaBadge.textContent = `配额 ${q.ratio} · ${(q.nextTickMs/1000).toFixed(0)}s`
    quotaBadge.title = `RPM: ${q.rpmUsed}  TPM: ${q.tpmUsed}`
    const pct = parseFloat(q.ratio)
    quotaBadge.style.color = pct > 90 ? '#f85149' : pct > 60 ? '#e3b341' : '#56d364'
  }

  function fetchStatus() {
    fetch('/status').then(r => r.json()).then(d => {
      badge.textContent = `记忆 ${d.memory_count}`
    }).catch(() => {})
    fetch('/quota').then(r => r.json()).then(updateQuota).catch(() => {})
  }

  // 提示音（Web Audio API 合成，无需音频文件）
  let audioCtx = null
  function playMessageTone() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      const ctx = audioCtx
      const now = ctx.currentTime
      const osc = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain)
      gain.connect(ctx.destination)
      osc.type = 'sine'
      osc.frequency.setValueAtTime(880, now)
      osc.frequency.exponentialRampToValueAtTime(660, now + 0.12)
      gain.gain.setValueAtTime(0.18, now)
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22)
      osc.start(now)
      osc.stop(now + 0.22)
    } catch (_) {}
  }

  function connect() {
    dot.className = 'status-ring'
    const es = new EventSource('/events')
    es.onmessage = e => { try { handle(JSON.parse(e.data)) } catch {} }
    es.onerror = () => {
      dot.className = 'status-ring error'
      es.close()
      setTimeout(connect, 3000)
    }
  }

  connect()

  // 键盘弹出时滚到底部（Chrome flex 布局会自动调整位置）
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      const keyboardHeight = window.innerHeight - window.visualViewport.height
      if (keyboardHeight > 50) setTimeout(scrollToBottom, 80)
    })
  }

  // ── 消息输入框 ──
  const input = document.getElementById('composer-input')
  const sendBtn = document.getElementById('composer-send')

  // 自动撑高 textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto'
    input.style.height = Math.min(input.scrollHeight, 120) + 'px'
  })

  // Enter 发送，Shift+Enter 换行
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  })

  sendBtn.addEventListener('click', sendMessage)

  function sendMessage() {
    const content = input.value.trim()
    if (!content) return
    sendBtn.disabled = true
    sendBtn.textContent = '发送中…'
    fetch('/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from_id: 'Yuanda', content }),
    }).then(r => r.json()).then(() => {
      input.value = ''
      input.style.height = 'auto'
      const { card, contentEl } = createCard('message', '你 → Jarvis', ts(new Date().toISOString()))
      card.classList.add('outgoing')
      contentEl.textContent = content
      scrollToBottom()
    }).catch(err => {
      addEvent('error', '发送失败', esc(err.message), ts(new Date().toISOString()))
    }).finally(() => {
      sendBtn.disabled = false
      sendBtn.textContent = '发送'
      input.focus()
    })
  }
</script>
</body>
</html>
